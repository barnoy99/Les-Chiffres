<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FAF6F0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Les Chiffres</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <div id="app">

    <!-- HOME SCREEN -->
    <section id="screen-home" class="screen screen--active">
      <div class="splash-content">
        <h1 class="splash-title">Les<br><span class="splash-accent">Chiffres</span></h1>
        <p class="splash-flourish">― ✦ ―</p>
        <p class="splash-subtitle">Maîtriser les nombres en français</p>
        <div class="home-buttons">
          <button id="btn-number" class="btn-home btn-home--primary">
            <div class="btn-home-text">
              <span class="btn-home-label">Les Nombres</span>
              <span class="btn-home-sub">Dis le chiffre à voix haute</span>
            </div>
            <svg class="btn-home-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>
          </button>
          <button id="btn-acquis" class="btn-home btn-home--secondary">
            <div class="btn-home-text">
              <span class="btn-home-label">Mes Phrases <span id="acquis-count" class="btn-home-count">(0)</span></span>
              <span class="btn-home-sub">Traduis la phrase</span>
            </div>
            <svg class="btn-home-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </button>
          <button id="btn-handsfree" class="btn-home btn-home--tertiary">
            <div class="btn-home-text">
              <span class="btn-home-label">Mains Libres <span id="handsfree-count" class="btn-home-count">(0)</span></span>
              <span class="btn-home-sub">Écoute sans les mains</span>
            </div>
            <svg class="btn-home-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>
          </button>
          <button id="btn-home-progress" class="btn-text" style="margin-top:0.25rem">Progrès</button>
        </div>
      </div>
    </section>

    <!-- NUMBER DRILL SCREEN (Option 1) -->
    <section id="screen-number" class="screen">
      <div class="phrase-header">
        <button id="btn-number-home" class="btn-text">Accueil</button>
        <div class="handsfree-skip-row">
          <span id="number-counter" class="session-counter"></span>
          <button id="btn-number-next" class="btn-skip" aria-label="Suivant">⏭</button>
        </div>
      </div>

      <div class="phrase-content">
        <p id="number-type" class="phrase-context"></p>

        <div class="number-card">
          <p id="number-display" class="number-display"></p>
        </div>

        <div class="phrase-divider">✦</div>

        <div id="number-rating" class="rating-buttons">
          <button class="rating-btn rating-known" data-rating="facile">
            <span class="rating-icon">✦</span>
            <span class="rating-label">Facile</span>
          </button>
          <button class="rating-btn rating-unknown" data-rating="difficile">
            <span class="rating-icon">○</span>
            <span class="rating-label">Difficile</span>
          </button>
        </div>

        <div id="number-reveal" class="translation-reveal hidden">
          <div class="number-answer-card">
            <p id="number-answer" class="phrase-french"></p>
            <button id="btn-number-tts" class="btn-tts" aria-label="Écouter">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="handsfree-pause-wrap">
        <button id="btn-number-suivant" class="btn-primary btn-bar bar-right hidden">Suivant</button>
      </div>
    </section>

    <!-- ACQUIS / PHRASES SCREEN (Option 2) -->
    <section id="screen-acquis" class="screen">
      <div class="phrase-header">
        <button id="btn-acquis-home" class="btn-text">Accueil</button>
        <div class="handsfree-skip-row">
          <button id="btn-acquis-prev" class="btn-skip" aria-label="Précédent">⏮</button>
          <span id="acquis-counter" class="session-counter"></span>
          <button id="btn-acquis-next" class="btn-skip" aria-label="Suivant">⏭</button>
        </div>
      </div>
      <div class="phrase-content">
        <p id="acquis-context" class="phrase-context"></p>
        <div class="acquis-prompt-card">
          <p id="acquis-english" class="acquis-english"></p>
        </div>
        <div class="phrase-divider">✦</div>
        <div id="acquis-reveal-area" class="acquis-reveal-area">
          <button id="btn-reveler" class="btn-primary">Révéler</button>
        </div>
        <div id="acquis-revealed" class="acquis-revealed hidden">
          <div class="acquis-french-card">
            <p id="acquis-french" class="phrase-french"></p>
            <button id="btn-tts" class="btn-tts" aria-label="Écouter">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="handsfree-pause-wrap">
        <button id="btn-acquis-six" class="btn-handsfree-six bar-mid">×6</button>
        <button id="btn-suivant" class="btn-primary btn-bar bar-right hidden">Suivant</button>
      </div>
    </section>

    <!-- ACQUIS DONE SCREEN -->
    <section id="screen-acquis-done" class="screen">
      <div class="complete-content">
        <p class="complete-icon">✦</p>
        <h2 class="complete-title">Terminé !</h2>
        <p class="complete-text">Vous avez parcouru toutes vos phrases.</p>
        <button id="btn-acquis-done-home" class="btn-primary">Retour</button>
      </div>
    </section>

    <!-- HANDS-FREE SCREEN (Option 3) -->
    <section id="screen-handsfree" class="screen">
      <div class="phrase-header">
        <button id="btn-handsfree-home" class="btn-text">Arrêter</button>
        <div class="handsfree-skip-row">
          <button id="btn-handsfree-prev" class="btn-skip" aria-label="Précédent">⏮</button>
          <span id="handsfree-counter" class="session-counter"></span>
          <button id="btn-handsfree-next" class="btn-skip" aria-label="Suivant">⏭</button>
        </div>
      </div>
      <div class="phrase-content handsfree-content">
        <p id="handsfree-phase" class="handsfree-phase"></p>
        <div id="handsfree-english-card" class="acquis-prompt-card">
          <p id="handsfree-english" class="acquis-english"></p>
        </div>
        <div id="handsfree-french-area" class="hidden">
          <div class="acquis-french-card">
            <p id="handsfree-french" class="phrase-french"></p>
          </div>
        </div>
        <div id="handsfree-countdown" class="handsfree-countdown">
          <span id="handsfree-countdown-num" class="handsfree-countdown-num">–</span>
        </div>
        <div class="handsfree-pause-wrap">
          <button id="btn-handsfree-six" class="btn-handsfree-six bar-mid">×6</button>
          <button id="btn-handsfree-pause" class="btn-handsfree-pause bar-right">⏸ Pause</button>
        </div>
      </div>
    </section>

    <!-- PROGRESS OVERLAY -->
    <div id="overlay-progress" class="overlay hidden">
      <div class="overlay-content">
        <div class="overlay-header">
          <h2 class="overlay-title">Votre progrès</h2>
          <button id="btn-close-progress" class="btn-close" aria-label="Fermer">&times;</button>
        </div>
        <div class="progress-overview">
          <p id="progress-overview-text" class="progress-overview-text"></p>
          <p id="progress-stats-text" class="progress-stats-text"></p>
        </div>
        <div id="progress-list" class="progress-list"></div>
        <div class="overlay-footer">
          <button id="btn-reset-progress" class="btn-text btn-danger">Réinitialiser tout</button>
        </div>
      </div>
    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js?v=1"></script>
  <script src="numbers.js?v=1"></script>
  <script src="data.js?v=2"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
